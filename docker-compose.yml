services:
  pylontech-console:
    build: .
    command: python -m pylontech_console.main
    environment:
      PYLONTECH_WAVESHARE_HOST: ${PYLONTECH_WAVESHARE_HOST}
      PYLONTECH_WAVESHARE_PORT: ${PYLONTECH_WAVESHARE_PORT:-4196}
      PYLONTECH_WAVESHARE_CONNECT_TIMEOUT_SECONDS: ${PYLONTECH_WAVESHARE_CONNECT_TIMEOUT_SECONDS:-5}
      PYLONTECH_WAVESHARE_RESPONSE_TIMEOUT_SECONDS: ${PYLONTECH_WAVESHARE_RESPONSE_TIMEOUT_SECONDS:-5}
